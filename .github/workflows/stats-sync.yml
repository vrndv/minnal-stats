name: Minecraft Stats Sync

on:
  schedule:
    - cron: '0 10,15,23 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run (optional)'
        required: false
        default: 'Manual trigger'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Install lftp
        run: sudo apt-get install -y lftp

      # ── Download usercache.json (single file, same as BlueMap tarball) ──────
      - name: Download usercache.json
        env:
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASS: ${{ secrets.SFTP_PASS }}
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
        run: |
          mkdir -p src/stats

          # Test connectivity first
          echo "Testing connection to $SFTP_HOST:$SFTP_PORT..."
          nc -zv -w 10 "$SFTP_HOST" "$SFTP_PORT" && echo "✔ Port reachable" || echo "❌ Port unreachable"

          lftp -u "$SFTP_USER","$SFTP_PASS" "sftp://$SFTP_HOST:$SFTP_PORT" \
            -e "set sftp:auto-confirm yes; set net:timeout 60; set net:max-retries 5; get \"/usercache.json\" -o \"src/usercache.json\"; bye"
          echo "✔ usercache.json: $(wc -c < src/usercache.json) bytes"

      # ── Get list of stat files then download each one ────────────────────────
      # Uses the same -e flag approach as BlueMap (no mirror command)
      - name: Download stats files
        env:
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASS: ${{ secrets.SFTP_PASS }}
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
        run: |
          mkdir -p src/stats

          # Get file listing first
          lftp -u "$SFTP_USER","$SFTP_PASS" "sftp://$SFTP_HOST:$SFTP_PORT" \
            -e "set sftp:auto-confirm yes; set net:timeout 60; set net:max-retries 5; cls -1 /world/stats/; bye" \
            > /tmp/stats_list.txt 2>&1

          echo "Stats files on server:"
          cat /tmp/stats_list.txt

          # Download each file individually (same method as BlueMap get)
          while IFS= read -r filename; do
            filename=$(basename "$filename")
            [[ "$filename" == *.json ]] || continue
            lftp -u "$SFTP_USER","$SFTP_PASS" "sftp://$SFTP_HOST:$SFTP_PORT" \
              -e "set sftp:auto-confirm yes; set net:timeout 60; set net:max-retries 5; get \"/world/stats/${filename}\" -o \"src/stats/${filename}\"; bye"
            echo "  ✔ $filename"
          done < /tmp/stats_list.txt

          echo "✔ Total: $(ls src/stats/ | wc -l) files"

      # ── Commit and push ───────────────────────────────────────────────────────
      - name: Commit and push
        run: |
          git config user.name "Stats Bot"
          git config user.email "stats-bot@github-actions"
          git add src/

          if git diff --cached --quiet; then
            echo "✅ No changes — stats unchanged since last run"
          else
            COUNT=$(git diff --cached --name-only | wc -l | tr -d ' ')
            git diff --cached --name-only
            git commit -m "Stats sync — $(date +'%Y-%m-%d %H:%M:%S') — ${COUNT} file(s)"
            git push origin HEAD
            echo "🚀 Pushed $COUNT file(s)"
          fi
