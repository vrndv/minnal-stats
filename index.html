<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minnal SMP Analytics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <a href="https://varundev.tech/minnal" class="back-btn" aria-label="Back to main menu">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="15 18 9 12 15 6"></polyline>
  </svg>
  
</a>
    <div class="bg-effects">
        <div class="glow-orb primary"></div>
        <div class="glow-orb secondary"></div>
        <div class="noise-overlay"></div>
    </div>

    <div class="dashboard-wrapper">
        <header class="top-nav">
            <div class="brand">
                <img src="https://blocksitems.com/api/v1/items/minecraft:ender_eye/icon" alt="Minnal Logo" class="brand-icon">
                <h1>Minnal SMP</h1>
            </div>
        </header>

        <section class="player-selector-wrapper">
            <div id="user-list" class="user-list">
                <div class="skeleton skeleton-card"></div>
                <div class="skeleton skeleton-card"></div>
                <div class="skeleton skeleton-card"></div>
                <div class="skeleton skeleton-card"></div>
                <div class="skeleton skeleton-card"></div>
            </div>
        </section>

        <main id="stats-container" class="main-content">
            <div class="hero-empty-state">
                <div class="empty-icon-wrapper">
                    <img src="https://blocksitems.com/api/v1/items/minecraft:compass/icon" alt="Compass">
                </div>
                <h2>Select a Player</h2>
                <p>Choose a player from the roster above to view their real-time statistics, combat records, and server analytics.</p>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
